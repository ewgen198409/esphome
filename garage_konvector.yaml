substitutions:
  name: garage-konvector

esphome:
  name: ${name}

esp8266:
  board: sonoff_th
  restore_from_flash: true

# Глобальные переменные для логики
globals:
  - id: thermostat_state_before_peak
    type: bool
    initial_value: 'false'
  - id: in_peak
    type: bool
    initial_value: 'false'
  - id: manual_override
    type: bool
    initial_value: 'false'

# Скрипт мигания синим светодиодом (индикация пика)
script:
  - id: blink_blue_led
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(in_peak);'
          then:
            - light.turn_on: blue_led
            - delay: 500ms
            - light.turn_off: blue_led
            - delay: 2000ms

udp:
  id: udp_hub

packet_transport:
  - platform: udp
    binary_sensors:
      - konvector_state

logger:

api:
  encryption:
    key: "Ldm49FmXtWzGqzHLQaf91mkPmK/Ajq1lrKILY05+NgE="

ota:
  - platform: esphome
    password: "0cf2d59e134cf13be87b10fd500c2e19"

wifi:
  <<: !include networks.yaml
  min_auth_mode: WPA2
  manual_ip:
    static_ip: 192.168.1.245
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  use_address: 192.168.1.245

mdns:
  disabled: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
    ssid:
      name: SSID

  - platform: template
    name: "Current time"
    id: current_time_str
    lambda: |-
      char str[20];
      time_t currTime = id(ntp_time).now().timestamp;
      strftime(str, sizeof(str), "%H:%M:%S", localtime(&currTime));
      return std::string(str);
    update_interval: 5s # Для отладки лучше чаще, потом можно 60s

time:
  - platform: sntp
    id: ntp_time
    timezone: Asia/Omsk
    servers:
      - 0.openwrt.pool.ntp.org
      - 1.openwrt.pool.ntp.org
      - 192.168.1.1 

light:
  - platform: monochromatic
    name: "Blue LED"
    output: blue_led_output # Ссылаемся на новый ID выхода
    id: blue_led
    internal: true
    restore_mode: ALWAYS_OFF

output:
  - platform: esp8266_pwm
    id: blue_led_output # Даем уникальный ID железному пину
    pin: GPIO13
    inverted: True

switch:
  - platform: gpio
    id: relay
    name: Relay ${name}
    pin: GPIO12

  - platform: template
    name: "Выключать ${name} в ПИК"
    optimistic: true
    icon: mdi:clock
    id: switch_peack_off
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - lambda: |-
            id(manual_override) = false;
            if (id(in_peak) && id(thermostat_state_before_peak)) {
              auto call = id(thermostat_garage_konvector).make_call();
              call.set_mode(climate::CLIMATE_MODE_HEAT);
              call.perform();
            }

binary_sensor:
  # ФИЗИЧЕСКАЯ КНОПКА (с логикой Override)
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: True
    name: "Button ${name}"
    internal: true
    on_press:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_konvector).make_call();
            bool is_heating = (id(thermostat_garage_konvector).mode == climate::CLIMATE_MODE_HEAT);
            
            if (is_heating) {
              call.set_mode(climate::CLIMATE_MODE_OFF);
              id(manual_override) = false; 
            } else {
              call.set_mode(climate::CLIMATE_MODE_HEAT);
              if (id(in_peak)) {
                id(manual_override) = true;
                ESP_LOGI("manual", "Ручной перехват в пик (кнопка)");
              }
            }
            call.perform();

  # СТАТУС ДЛЯ UDP
  - platform: template
    id: konvector_state
    name: Konvector state
    lambda: 'return id(thermostat_garage_konvector).mode == climate::CLIMATE_MODE_HEAT;'
 
  # КОМАНДЫ ПО UDP (с логикой Override)
  - platform: packet_transport
    id: konvector_command
    internal: true
    remote_id: konvector_command
    provider: pcf8574
    on_press:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_konvector).make_call();
            call.set_mode(climate::CLIMATE_MODE_HEAT);
            call.perform();
            if (id(in_peak)) {
              id(manual_override) = true;
              ESP_LOGI("udp", "Ручной перехват в пик (UDP)");
            }
    on_release:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_konvector).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
            id(manual_override) = false;

sensor:
  - platform: packet_transport
    provider: co2-sensor-garage
    remote_id: garage_temp
    id: garage_temp
    internal: true
    filters:
      - timeout:
          timeout: 15min
          value: nan # Защита: если датчик уснул, термостат выключится

  - platform: wifi_signal
    name: WiFi Strength
    id: wifi_signal_db

  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: WiFi Signal ${name}
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
    
climate:
  - platform: thermostat
    id: thermostat_garage_konvector
    name: "Thermostat ${name}"
    sensor: garage_temp
    # Убираем restore_mode, добавляем обязательные тайминги для защиты реле:
    min_heating_off_time: 10s
    min_heating_run_time: 10s
    min_idle_time: 10s
    visual:
      min_temperature: 5
      max_temperature: 25
    heat_deadband: 1.0
    heat_action:
      - switch.turn_on: relay
    idle_action:
      - switch.turn_off: relay
    on_state:
      then:
        - binary_sensor.template.publish:
            id: konvector_state
            state: !lambda 'return x.mode == climate::CLIMATE_MODE_HEAT;'

# ОСНОВНАЯ ЛОГИКА ПИКА
interval:
  - interval: 60s
    then:
      lambda: |-
        auto now = id(ntp_time).now();
        if (!now.is_valid()) return;
        
        int hour = now.hour;
        bool is_peak = (hour >= 7 && hour < 10) || (hour >= 17 && hour < 21);
        bool peak_switch = id(switch_peack_off).state;

        // Вход в пик
        if (is_peak && !id(in_peak)) {
          id(in_peak) = true;
          id(manual_override) = false;
          id(blink_blue_led).execute();
          
          if (peak_switch) {
            id(thermostat_state_before_peak) = (id(thermostat_garage_konvector).mode == climate::CLIMATE_MODE_HEAT);
            auto call = id(thermostat_garage_konvector).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
            ESP_LOGI("peak", "Начало пика: выключаем");
          }
        }
        
        // Выход из пика
        else if (!is_peak && id(in_peak)) {
          id(in_peak) = false;
          id(manual_override) = false;
          id(blink_blue_led).stop();
          id(blue_led).turn_off().perform();
          
          if (peak_switch && id(thermostat_state_before_peak)) {
            auto call = id(thermostat_garage_konvector).make_call();
            call.set_mode(climate::CLIMATE_MODE_HEAT);
            call.perform();
            ESP_LOGI("peak", "Конец пика: восстанавливаем");
          }
        }
        
        // Принудительное удержание выключенным в пик (если нет override)
        if (is_peak && peak_switch && !id(manual_override)) {
          if (id(thermostat_garage_konvector).mode == climate::CLIMATE_MODE_HEAT) {
            auto call = id(thermostat_garage_konvector).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
          }
        }