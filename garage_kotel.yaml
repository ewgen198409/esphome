substitutions:
  name: garage-kotel

esphome:
  name: ${name}

bk72xx:
  board: generic-bk7231t-qfn32-tuya

api:
  encryption:
    key: "A+xLM79G2f7hVt1VqNu2u090EHyfxqGEUhjZ1ZYKH9I="
  reboot_timeout: 1800s

ota:
  platform: esphome

udp:
  id: udp_hub

packet_transport:
  - platform: udp
    binary_sensors:
      - kotel_state

logger:

wifi:
  <<: !include networks.yaml
  manual_ip:
    static_ip: 192.168.1.218
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
  use_address: 192.168.1.218

mdns:
  disabled: true

time:
  - platform: sntp
    id: ntp_time
    timezone: Asia/Omsk  # Проверь часовой пояс, в прошлом конфиге был Омск
    servers:
      - 0.openwrt.pool.ntp.org
      - 1.openwrt.pool.ntp.org
      - 192.168.1.1 

# Глобальные переменные
globals:
  - id: thermostat_state_before_peak
    type: bool
    initial_value: 'false'
  - id: in_peak
    type: bool
    initial_value: 'false'
  - id: manual_override
    type: bool
    initial_value: 'false'

# Скрипт мигания светодиодом статуса (P7)
script:
  - id: blink_status_led
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(in_peak);'
          then:
            - light.turn_on: status_led_light
            - delay: 500ms
            - light.turn_off: status_led_light
            - delay: 2000ms

light:
  - platform: binary
    name: "Status LED"
    id: status_led_light
    output: led_pin
    internal: true

output:
  - platform: gpio
    id: led_pin
    pin:
      number: P7
      inverted: true

button:
  - platform: restart
    name: Restart

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address
  - platform: template
    name: "Current time"
    lambda: |-
      char str[20];
      time_t currTime = id(ntp_time).now().timestamp;
      strftime(str, sizeof(str), "%Y-%m-%d %H:%M", localtime(&currTime));
      return std::string(str);
    update_interval: 60s

sensor:
  - platform: uptime
    name: Uptime

  - platform: packet_transport
    provider: co2-sensor-garage
    remote_id: garage_temp
    id: garage_temp
    internal: true
    filters:
      - timeout:
          timeout: 15min
          value: nan # Защита: если сеть упала, котел не перегреет гараж

  - platform: packet_transport
    provider: co2-sensor-garage
    remote_id: garage_hum
    id: garage_hum
    internal: true

  - platform: duty_time
    id: kotel_work_time
    name: "Время работы котла"
    update_interval: 30s
    lambda: "return id(switch_1).state;"
    restore: true

  - platform: wifi_signal
    name: WiFi Strength
    id: wifi_signal_db


  - platform: copy # Reports the WiFi signal strength in %
    source_id: wifi_signal_db
    name: WiFi Signal ${name}
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""

binary_sensor:
  # ФИЗИЧЕСКАЯ КНОПКА (P6)
  - platform: gpio
    id: binary_switch_1
    pin:
      number: P6
      inverted: true
      mode: INPUT_PULLUP
    on_press:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_kotel).make_call();
            bool is_heating = (id(thermostat_garage_kotel).mode == climate::CLIMATE_MODE_HEAT);
            if (is_heating) {
              call.set_mode(climate::CLIMATE_MODE_OFF);
              id(manual_override) = false;
            } else {
              call.set_mode(climate::CLIMATE_MODE_HEAT);
              if (id(in_peak)) {
                id(manual_override) = true;
                ESP_LOGI("manual", "Котёл: ручной перехват в пик (кнопка)");
              }
            }
            call.perform();

  # КОМАНДЫ ПО UDP
  - platform: packet_transport
    id: kotel_command
    internal: true
    remote_id: kotel_command
    provider: pcf8574
    on_press:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_kotel).make_call();
            call.set_mode(climate::CLIMATE_MODE_HEAT);
            call.perform();
            if (id(in_peak)) {
              id(manual_override) = true;
              ESP_LOGI("udp", "Котёл: ручной перехват в пик (UDP)");
            }
    on_release:
      then:
        - lambda: |-
            auto call = id(thermostat_garage_kotel).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
            id(manual_override) = false;

  - platform: template
    id: kotel_state
    name: Kotel state
    lambda: 'return id(thermostat_garage_kotel).mode == climate::CLIMATE_MODE_HEAT;'

switch:
  - platform: gpio
    id: switch_1
    name: Relay Kotel
    pin: P24

  - platform: template
    name: "Не включать в ПИК"
    optimistic: true
    id: switch_peack_off
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_off:
      then:
        - lambda: |-
            id(manual_override) = false;
            if (id(in_peak) && id(thermostat_state_before_peak)) {
              auto call = id(thermostat_garage_kotel).make_call();
              call.set_mode(climate::CLIMATE_MODE_HEAT);
              call.perform();
            }

climate:
  - platform: thermostat
    id: thermostat_garage_kotel
    name: "Thermostat Garage Kotel"
    sensor: garage_temp
    humidity_sensor: garage_hum
    # Новые обязательные параметры:
    min_heating_off_time: 30s
    min_heating_run_time: 30s
    min_idle_time: 30s
    visual:
      min_temperature: 5
      max_temperature: 25
    heat_deadband: 1.0
    heat_action:
      - switch.turn_on: switch_1
    idle_action:
      - switch.turn_off: switch_1
    on_state:
      then:
        - binary_sensor.template.publish:
            id: kotel_state
            state: !lambda 'return x.mode == climate::CLIMATE_MODE_HEAT;'

# Логика пикового времени
interval:
  - interval: 60s
    then:
      lambda: |-
        auto now = id(ntp_time).now();
        if (!now.is_valid()) return;
        
        int hour = now.hour;
        bool is_peak = (hour >= 7 && hour < 10) || (hour >= 17 && hour < 21);
        bool peak_switch = id(switch_peack_off).state;

        // Вход в пик
        if (is_peak && !id(in_peak)) {
          id(in_peak) = true;
          id(manual_override) = false;
          id(blink_status_led).execute();
          
          if (peak_switch) {
            id(thermostat_state_before_peak) = (id(thermostat_garage_kotel).mode == climate::CLIMATE_MODE_HEAT);
            auto call = id(thermostat_garage_kotel).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
            ESP_LOGI("peak", "Пик котла: выключаем");
          }
        }
        
        // Выход из пика
        else if (!is_peak && id(in_peak)) {
          id(in_peak) = false;
          id(manual_override) = false;
          id(blink_status_led).stop();
          id(status_led_light).turn_off().perform();
          
          if (peak_switch && id(thermostat_state_before_peak)) {
            auto call = id(thermostat_garage_kotel).make_call();
            call.set_mode(climate::CLIMATE_MODE_HEAT);
            call.perform();
            ESP_LOGI("peak", "Пик котла: восстановление");
          }
        }
        
        // Защита от включения в пик без override
        if (is_peak && peak_switch && !id(manual_override)) {
          if (id(thermostat_garage_kotel).mode == climate::CLIMATE_MODE_HEAT) {
            auto call = id(thermostat_garage_kotel).make_call();
            call.set_mode(climate::CLIMATE_MODE_OFF);
            call.perform();
          }
        }
